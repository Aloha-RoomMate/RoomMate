server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  types {
      
      text/html html htm;
      
      application/javascript js mjs;
      text/css css;
      application/wasm wasm;
      image/svg+xml svg;
      image/png png;
      image/jpeg jpg jpeg;
      application/json json;
      font/woff2 woff2;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}