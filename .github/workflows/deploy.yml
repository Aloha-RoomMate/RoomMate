name: Build & Push (stable+sha) -> NHN Pipeline auto deploy

on:
  push:
    branches: ['23-feature_jinhyun', 'master']   # 필요하면 수정
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/roommate-web

jobs:
  web-build-and-push:
    runs-on: ubuntu-latest
    concurrency:
      group: roommate-web-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Flutter 설치
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'   # Dart 3.8.x 포함
          channel: stable
          cache: true

      - name: Flutter versions
        run: |
          flutter --version
          dart --version

      - name: Flutter pub get
        run: flutter pub get

      # 웹 번들 빌드 (서비스워커 비활성화 → 캐시 이슈 방지)
      - name: Build Flutter Web (release)
        run: |
          flutter build web --release --no-wasm-dry-run --pwa-strategy=none \
            --dart-define=JUSO_API_KEY=${{ secrets.JUSO_API_KEY }} \
            --dart-define=VWORLD_API_KEY=${{ secrets.VWORLD_API_KEY }}

      # buildx 준비 + Docker Hub 로그인
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: true

      # 커밋 SHA(짧은 형태) 만들기
      - name: Compute tags
        id: vars
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::12}" >> $GITHUB_ENV
          echo "short_sha=${GITHUB_SHA::12}" >> $GITHUB_OUTPUT

      # 이미지 빌드 & 푸시 (stable + SHA)
      - name: Build & Push image (stable + sha)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          # Dockerfile이 루트가 아니면 아래 주석 해제 후 경로 수정
          # file: ./deploy/Dockerfile
          platforms: linux/amd64
          push: true
          # 항상 같은 stable + 매번 바뀌는 SHA(불변 태그)
          tags: |
            ${{ env.IMAGE_NAME }}:stable
            ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:stable
          cache-to: type=inline
          sbom: false
          provenance: false

      # 로그용: 푸시된 다이제스트 출력
      - name: Show pushed digests
        run: |
          echo "IMAGE(stable) : $IMAGE_NAME:stable"
          echo "IMAGE(sha)    : $IMAGE_NAME:$SHORT_SHA"
          echo "DIGEST(stable):"
          docker buildx imagetools inspect $IMAGE_NAME:stable | grep -m1 digest || true
          echo "DIGEST(sha)   :"
          docker buildx imagetools inspect $IMAGE_NAME:$SHORT_SHA | grep -m1 digest || true
