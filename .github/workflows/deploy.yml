name: Build & Push (stable+sha)

on:
  push:
    branches: ['23-feature_jinhyun', 'master']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/roommate-web

jobs:
  web-build-and-push:
    runs-on: ubuntu-latest
    concurrency:
      group: roommate-web-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: stable
          cache: true

      - name: Flutter versions
        run: |
          flutter --version
          dart --version

      - name: Flutter pub get
        run: flutter pub get

      # 서비스워커 비활성화(캐시 꼬임 방지)
      - name: Build Flutter Web (release)
        run: |
          flutter build web --release --no-wasm-dry-run --pwa-strategy=none \
            --dart-define=JUSO_API_KEY=${{ secrets.JUSO_API_KEY }} \
            --dart-define=VWORLD_API_KEY=${{ secrets.VWORLD_API_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: true

      - name: Compute tags
        id: vars
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::12}" >> $GITHUB_ENV
          echo "short_sha=${GITHUB_SHA::12}" >> $GITHUB_OUTPUT

      - name: Build & Push image (stable + sha)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:stable
            ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:stable
          cache-to: type=inline
          sbom: false
          provenance: false
