name: Build & Push (stable+sha) -> NHN Pipeline auto deploy

on:
  push:
    branches: ['23-feature_jinhyun','master']   # 필요시 수정
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/roommate-web
  SHA_TAG: ${{ github.sha }}

jobs:
  web-build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Flutter 설치
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"   # Dart 3.8.x 포함
          channel: "stable"
          cache: true

      - name: Check Flutter/Dart versions
        run: |
          flutter --version
          dart --version

      - name: Flutter pub get
        run: flutter pub get

      # 웹 번들 빌드 (서비스워커 비활성화 → 캐시 이슈 방지)
      - name: Build Flutter Web (release)
        run: |
          flutter build web --release --no-wasm-dry-run --pwa-strategy=none \
            --dart-define=JUSO_API_KEY=${{ secrets.JUSO_API_KEY }} \
            --dart-define=VWORLD_API_KEY=${{ secrets.VWORLD_API_KEY }}

      # Docker 빌드 준비 및 로그인
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: true

      # Docker 이미지 빌드 & 푸시 (stable + 커밋 SHA)
      - name: Build & Push image (stable + sha)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          # Dockerfile이 루트가 아니면 아래 주석 해제 후 경로 수정
          # file: ./deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:stable
            ${{ env.IMAGE_NAME }}:${{ env.SHA_TAG }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:stable
          cache-to: type=inline

      - name: Show pushed digests (optional)
        run: |
          echo "stable digest:"
          docker buildx imagetools inspect $IMAGE_NAME:stable | grep -m1 digest || true
          echo "sha digest:"
          docker buildx imagetools inspect $IMAGE_NAME:$SHA_TAG | grep -m1 digest || true
