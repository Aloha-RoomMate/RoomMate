# .github/workflows/deploy.yml
name: Build & Deploy (immutable digest)

on:
  push:
    branches: ['23-feature_jinhyun', 'master']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/roommate-web
  NS: roommate
  DEPLOYMENT: roommate-web

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: roommate-web-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # 서비스워커 비활성화 → 캐시 꼬임 방지
      - name: Build Flutter Web (release)
        run: |
          flutter build web --release --no-wasm-dry-run --pwa-strategy=none \
            --dart-define=JUSO_API_KEY=${{ secrets.JUSO_API_KEY }} \
            --dart-define=VWORLD_API_KEY=${{ secrets.VWORLD_API_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          logout: true

      # stable + 커밋 SHA 두 개 모두 푸시
      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:stable
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:stable
          cache-to: type=inline
          sbom: false
          provenance: false

      # 방금 푸시한 :stable 의 linux/amd64 다이제스트를 얻는다
      - name: Resolve digest of :stable (linux/amd64)
        id: digest
        shell: bash
        run: |
          set -e
          # 1) buildx imagetools 로 시도
          if docker buildx imagetools inspect "${IMAGE}:stable" >/dev/null 2>&1; then
            DIGEST=$(docker buildx imagetools inspect "${IMAGE}:stable" \
              | sed -n '/Platform: linux\/amd64/,/Platform:/p' \
              | awk '$1=="Digest:"{print $2; exit}')
          fi
          # 2) fallback: manifest inspect
          if [ -z "${DIGEST:-}" ] && docker manifest inspect "${IMAGE}:stable" >/dev/null 2>&1; then
            DIGEST=$(docker manifest inspect "${IMAGE}:stable" \
              | awk '/"platform": *{/{p=0} /"architecture": *"amd64"/{p=1} p && /"digest": *"/{gsub(/[" ,]/,""); print $2; exit}')
          fi
          # 3) 마지막 fallback: pull 후 RepoDigests
          if [ -z "${DIGEST:-}" ]; then
            docker pull "${IMAGE}:stable" >/dev/null
            DIGEST=$(docker image inspect "${IMAGE}:stable" --format='{{index .RepoDigests 0}}' | sed 's/.*@//')
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "RESOLVED DIGEST: $DIGEST"

      # kubectl 설치 & kubeconfig 주입
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.6'

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.NHN_KUBECONFIG }}" > ~/.kube/config

      # 디플로이먼트에 '이미지@다이제스트'로 확정 배포 + 주석으로 변경 이력 남김
      - name: Deploy by immutable digest
        run: |
          set -e
          kubectl -n "${NS}" set image deploy/${DEPLOYMENT} \
            web="${IMAGE}@${{ steps.digest.outputs.digest }}" --record
          # 안전 겸사겸사 스펙 변화 보장(주석 변경)
          kubectl -n "${NS}" annotate deploy/${DEPLOYMENT} \
            ci-run="${GITHUB_RUN_ID}" --overwrite
          kubectl -n "${NS}" rollout status deploy/${DEPLOYMENT}
          echo "Deployed digest: ${{ steps.digest.outputs.digest }}"
