- name: Login to Docker Hub
  uses: docker/login-action@v3
  with:
    username: ${{ secrets.DOCKERHUB_USERNAME }}
    password: ${{ secrets.DOCKERHUB_TOKEN }}

- name: Build Flutter Web
  run: |
    flutter build web --release \
      --dart-define=JUSO_API_KEY=${{ secrets.JUSO_API_KEY }} \
      --dart-define=VWORLD_API_KEY=${{ secrets.VWORLD_API_KEY }}

- name: Build & Push image (stable)
  uses: docker/build-push-action@v6
  with:
    context: .
    push: true
    tags: ${{ secrets.DOCKERHUB_USERNAME }}/roommate-web:stable
