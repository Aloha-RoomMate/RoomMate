apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP}
  namespace: ${NS}
spec:
  replicas: ${REPLICAS}
  selector:
    matchLabels: { app: ${APP} }
  template:
    metadata: { labels: { app: ${APP} } }
    spec:
      containers:
        - name: web
          image: ${IMAGE}:${TAG}
          ports: [{containerPort: 80}]
          readinessProbe:
            httpGet: { path: /healthz, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 80 }
            initialDelaySeconds: 10
            periodSeconds: 10
---
# (선택) 기존 LB 서비스 없을 때만 사용
apiVersion: v1
kind: Service
metadata:
  name: ${APP}-svc
  namespace: ${NS}
spec:
  type: LoadBalancer
  selector: { app: ${APP} }
  ports: [{ port: 80, targetPort: 80 }]
